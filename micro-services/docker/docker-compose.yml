services:
  admin-analytics-service:
    build: ../services/admin-analytics-service
    ports:
      - "5001:5001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=5001
      - MONGO_URI=${ADMIN_MONGO_URI:-mongodb://mongodb:27017/admin_analytics}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
