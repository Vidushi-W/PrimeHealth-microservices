services:
  mongodb:
    image: mongo:latest
    container_name: primehealth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: primehealth
    networks:
      - primehealth-net
    restart: unless-stopped

  admin-analytics-service:
    build:
      context: ../services/admin-analytics-service
    container_name: primehealth-admin-service
    env_file:
      - ../../.env
    ports:
      - "5001:5001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=5001
      - MONGO_URI=${ADMIN_MONGO_URI}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
      - CROSS_SERVICE_SYNC_STRICT=${CROSS_SERVICE_SYNC_STRICT:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  doctor-service:
    build:
      context: ../services/doctor-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_DOCTOR:-mongodb://mongodb:27017/doctor-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - PAYMENT_SERVICE_URL=http://payment-service:5004
      - PRESCRIPTION_SERVICE_URL=http://prescription-service:5005
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  patient-service:
    build:
      context: ../services/patient-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    ports:
      - "5007:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PATIENT:-mongodb://mongodb:27017/patient-db}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  appointment-service:
    build:
      context: ../services/appointment-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_APPOINTMENT:-mongodb://mongodb:27017/appointment-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - PAYMENT_SERVICE_URL=http://payment-service:5004
    depends_on:
      - mongodb
      - doctor-service
      - patient-service
    networks:
      - primehealth-net
    restart: unless-stopped

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PAYMENT:-mongodb://mongodb:27017/payment-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      # Local dev default: SIMULATED (no PayHere). Set PAYMENT_PROVIDER=PAYHERE when sandbox is configured.
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-SIMULATED}
      - PAYMENT_SIMULATE_ALWAYS_SUCCESS=${PAYMENT_SIMULATE_ALWAYS_SUCCESS:-true}
      - PAYHERE_USE_SANDBOX=${PAYHERE_USE_SANDBOX:-true}
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID:-}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET:-}
      - PAYHERE_NOTIFY_URL=${PAYHERE_NOTIFY_URL:-http://localhost:5004/api/payments/payhere/notify}
      - PAYHERE_FRONTEND_BASE_URL=${PAYHERE_FRONTEND_BASE_URL:-http://localhost:5173}
    depends_on:
      - mongodb
      - appointment-service
    networks:
      - primehealth-net
    restart: unless-stopped

  prescription-service:
    build:
      context: ../services/prescription-service
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PRESCRIPTION:-mongodb://mongodb:27017/prescription-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  telemedicine-service:
    build:
      context: ../services/telemedicine-service
    container_name: primehealth-telemedicine-service
    env_file:
      - ../../.env
    ports:
      - "5006:5003"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${TELEMEDICINE_MONGO_URI:-mongodb://mongodb:27017/telemedicine}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - VIDEO_PROVIDER=${VIDEO_PROVIDER:-jitsi}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-false}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    depends_on:
      - mongodb
    volumes:
      - telemedicine_uploads:/app/uploads
    networks:
      - primehealth-net
    restart: unless-stopped

networks:
  primehealth-net:
    driver: bridge

volumes:
  mongodb_data:
  telemedicine_uploads:
