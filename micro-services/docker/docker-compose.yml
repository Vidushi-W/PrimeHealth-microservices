version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: primehealth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: primehealth
    networks:
      - primehealth-net
    restart: unless-stopped

  admin-analytics-service:
    build:
      context: ../services/admin-analytics-service
    container_name: primehealth-admin-service
    ports:
      - "5001:5001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=5001
      - MONGO_URI=${ADMIN_MONGO_URI:-mongodb://mongodb:27017/admin_analytics}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  doctor-service:
    build:
      context: ../services/doctor-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_DOCTOR}
      - CORS_ORIGIN=http://localhost:5173
      - PRESCRIPTION_SERVICE_URL=http://prescription-service:5005
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  appointment-service:
    build:
      context: ../services/appointment-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_APPOINTMENT}
      - CORS_ORIGIN=http://localhost:5173
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - PAYMENT_SERVICE_URL=http://payment-service:5004
    depends_on:
      - mongodb
      - doctor-service
    networks:
      - primehealth-net
    restart: unless-stopped

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PAYMENT}
      - CORS_ORIGIN=http://localhost:5173
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
    depends_on:
      - mongodb
      - appointment-service
    networks:
      - primehealth-net
    restart: unless-stopped

  prescription-service:
    build:
      context: ../services/prescription-service
      dockerfile: Dockerfile
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PRESCRIPTION}
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - primehealth-net
    restart: unless-stopped

  telemedicine-service:
    build:
      context: ../services/telemedicine-service
    container_name: primehealth-telemedicine-service
    ports:
      - "5006:5003"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${TELEMEDICINE_MONGO_URI:-mongodb://mongodb:27017/telemedicine}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - VIDEO_PROVIDER=${VIDEO_PROVIDER:-jitsi}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-false}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    depends_on:
      - mongodb
    volumes:
      - telemedicine_uploads:/app/uploads
    networks:
      - primehealth-net
    restart: unless-stopped

  telemedicine-frontend:
    build:
      context: ../../Frontend_UI/telemedicine_frontend(temp)
      dockerfile: Dockerfile
    container_name: primehealth-telemedicine-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:5006
    depends_on:
      - telemedicine-service
    networks:
      - primehealth-net
    restart: unless-stopped

networks:
  primehealth-net:
    driver: bridge

volumes:
  mongodb_data:
  telemedicine_uploads:
