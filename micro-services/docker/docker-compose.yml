services:
  admin-analytics-service:
    build: ../services/admin-analytics-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${ADMIN_MONGO_URI:-mongodb://mongodb:27017/admin_analytics}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb

  telemedicine-service:
    build: ../services/telemedicine-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=${TELEMEDICINE_MONGO_URI:-mongodb://mongodb:27017/telemedicine}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
