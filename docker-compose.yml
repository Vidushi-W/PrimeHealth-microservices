# Run from repository root so `.env` is loaded for ${MONGO_URI_DOCTOR} substitution:
#   docker compose up -d
#
# Atlas (default): ensure root `.env` defines MONGO_URI_* / TELEMEDICINE_MONGO_URI. App services
# do not require the local `mongodb` container.
#
# Local MongoDB only:
#   docker compose --profile local-mongo up -d
#
# Public DNS (8.8.8.8, 1.1.1.1) for all app containers helps MongoDB Atlas `mongodb+srv://`
# lookups when the host or Docker’s default resolver is slow or blocks SRV queries.

name: primehealth

x-dns-public: &dns-public
  dns:
    - 8.8.8.8
    - 1.1.1.1

services:
  mongodb:
    <<: *dns-public
    image: mongo:7
    container_name: primehealth-mongodb
    profiles: ["local-mongo"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: primehealth
    networks:
      - primehealth-net
    restart: unless-stopped

  admin-analytics-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/admin-analytics-service
    container_name: primehealth-admin-service
    env_file:
      - .env
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
      - CROSS_SERVICE_SYNC_STRICT=${CROSS_SERVICE_SYNC_STRICT:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - primehealth-net
    restart: unless-stopped

  doctor-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/doctor-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5002:5002"
    depends_on:
      - admin-analytics-service
    environment:
      - PORT=5002
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_DOCTOR:-mongodb://mongodb:27017/doctor-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - ADMIN_SERVICE_URL=http://admin-analytics-service:5001
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - PAYMENT_SERVICE_URL=http://payment-service:5004
      - PRESCRIPTION_SERVICE_URL=http://prescription-service:5005
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
    networks:
      - primehealth-net
    restart: unless-stopped

  patient-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/patient-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5007:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PATIENT:-mongodb://mongodb:27017/patient-db}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
    depends_on:
      - doctor-service
    networks:
      - primehealth-net
    restart: unless-stopped

  appointment-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/appointment-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_APPOINTMENT:-mongodb://mongodb:27017/appointment-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DOCTOR_SERVICE_URL=http://doctor-service:5002
      - PATIENT_SERVICE_URL=http://patient-service:5001
      - PAYMENT_SERVICE_URL=http://payment-service:5004
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
    depends_on:
      - doctor-service
      - patient-service
    networks:
      - primehealth-net
    restart: unless-stopped

  payment-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/payment-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PAYMENT:-mongodb://mongodb:27017/payment-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-SIMULATED}
      - PAYMENT_SIMULATE_ALWAYS_SUCCESS=${PAYMENT_SIMULATE_ALWAYS_SUCCESS:-true}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_FRONTEND_BASE_URL=${STRIPE_FRONTEND_BASE_URL:-http://localhost:5173}
    depends_on:
      - appointment-service
    networks:
      - primehealth-net
    restart: unless-stopped

  prescription-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/prescription-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI_PRESCRIPTION:-mongodb://mongodb:27017/prescription-db}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - primehealth-net
    restart: unless-stopped

  telemedicine-service:
    <<: *dns-public
    build:
      context: ./micro-services/services/telemedicine-service
    container_name: primehealth-telemedicine-service
    env_file:
      - .env
    ports:
      - "5006:5003"
    environment:
      - PORT=5003
      - NODE_ENV=production
      - MONGO_URI=${TELEMEDICINE_MONGO_URI:-mongodb://mongodb:27017/telemedicine}
      - JWT_SECRET=${JWT_SECRET:-primehealth_dev_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5003
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-primehealth-internal-sync-token}
      - VIDEO_PROVIDER=${VIDEO_PROVIDER:-jitsi}
      - JITSI_BASE_URL=${JITSI_BASE_URL:-https://8x8.vc}
      - JAAS_APP_ID=${JAAS_APP_ID:-}
      - JAAS_KID=${JAAS_KID:-}
      - JAAS_PRIVATE_KEY=${JAAS_PRIVATE_KEY:-}
      - JAAS_EXTERNAL_API_URL=${JAAS_EXTERNAL_API_URL:-}
      - TELEMEDICINE_JOIN_OPEN_BEFORE_START_MINUTES=${TELEMEDICINE_JOIN_OPEN_BEFORE_START_MINUTES:-10}
      - TELEMEDICINE_JOIN_GRACE_AFTER_END_MINUTES=${TELEMEDICINE_JOIN_GRACE_AFTER_END_MINUTES:-30}
      - TELEMEDICINE_DOCTOR_HOST_REQUIRED=${TELEMEDICINE_DOCTOR_HOST_REQUIRED:-true}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-false}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
    volumes:
      - telemedicine_uploads:/app/uploads
    networks:
      - primehealth-net
    restart: unless-stopped

networks:
  primehealth-net:
    driver: bridge

volumes:
  mongodb_data:
  telemedicine_uploads:
